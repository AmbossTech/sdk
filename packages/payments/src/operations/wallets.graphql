fragment PaymentsWalletFields on PaymentsWallet {
  id
  name
  asset_id
  environment_id
  created_at
  updated_at
  balance {
    balance
    received
    sent
  }
  asset {
    id
    symbol
    precision
    type
    description
    website_url
    taproot_asset_details {
      asset_id
      group_key
      universe
    }
  }
  environment {
    ...PaymentsEnvironmentFields
  }
  nodes {
    id
    alias
    pubkey
    state
    type
  }
}

fragment SimplePaymentsWalletFields on SimplePaymentsWallet {
  id
  name
  asset_id
  is_ready
  created_at
  asset {
    id
    symbol
    precision
    type
    description
    website_url
    taproot_asset_details {
      asset_id
      group_key
      universe
    }
  }
}

query ListWallets($environmentId: String!) {
  payment {
    wallet {
      find_many {
        list(environment_id: $environmentId) {
          ...SimplePaymentsWalletFields
        }
      }
    }
  }
}

query GetWallet($id: String!) {
  payment {
    wallet {
      find_one(id: $id) {
        ...PaymentsWalletFields
      }
    }
  }
}

mutation CreateWallet($input: CreatePaymentsWalletInput!) {
  payment {
    wallet {
      create(input: $input) {
        ...PaymentsWalletFields
      }
    }
  }
}

mutation DeleteWallet($id: String!) {
  payment {
    wallet {
      delete(id: $id)
    }
  }
}
