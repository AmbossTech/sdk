fragment PaymentsTransactionFields on PaymentsTransaction {
  id
  wallet_id
  node_id
  idempotency_key
  direction
  status
  amount {
    id
    display_amount
    full_amount
  }
  amount_sats
  asset {
    id
    symbol
    type
    precision
  }
  fee
  payment_hash
  payment_request
  description
  error
  expires_at
  settled_at
  created_at
  updated_at
}

mutation CreateReceiveTransaction($input: CreateReceiveTransactionInput!) {
  payment {
    transaction {
      create_receive(input: $input) {
        ...PaymentsTransactionFields
      }
    }
  }
}

mutation CreateSendTransaction($input: CreateSendTransactionInput!) {
  payment {
    transaction {
      create_send(input: $input) {
        ...PaymentsTransactionFields
      }
    }
  }
}

query GetWalletEnvironmentType($id: String!) {
  payment {
    wallet {
      find_one(id: $id) {
        id
        environment {
          id
          type
        }
      }
    }
  }
}

query GetWalletNodePermissions($id: String!, $password_hash: String) {
  payment {
    wallet {
      find_one(id: $id) {
        id
        asset {
          id
          type
          taproot_asset_details {
            group_key
          }
        }
        node_permissions(password_hash: $password_hash) {
          id
          encrypted_symmetric_key
          nodes {
            id
            node_id
            network
            encrypted_macaroon
            tls_cert
            sockets {
              id
              lnd {
                id
                rest
              }
              litd {
                id
                rest
              }
            }
          }
        }
      }
    }
  }
}
