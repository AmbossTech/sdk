type TradeQuote {
  asset: BitcoinAsset!
  expires: String!
  id: String!
  node: SimpleNode!
  rate: BitcoinAssetAmount!
}

type Transaction {
  amount: SatoshiAmount!
  confirmed: Boolean!
  cost_basis: String!
  date: String!
  fee: SatoshiAmount
  id: String!
  metadata: TransactionMetadata!
  status: TransactionStatus!
  type: TransactionType!
}

input TransactionInput {
  page: PageInput
  tx_types: [TransactionType!]
}

type TransactionList {
  id: String!
  list: [Transaction!]!
  pagination: Pagination!
  total_count: Float!
}

type TransactionMetadata {
  amount_routed: SatoshiAmount
  id: String!
  type: String!
}

type TransactionMutations {
  create_receive(input: CreateReceiveTransactionInput!): PaymentsTransaction!
  create_send(input: CreateSendTransactionInput!): PaymentsTransaction!
  id: String!
}

type TransactionQueries {
  find_many(input: ListTransactionsInput!): FindManyTransactions!
  find_one(id: String!): PaymentsTransaction!
  id: String!
}

enum TransactionStatus {
  RECEIVED
  SENT
}

enum TransactionType {
  CHANNEL_CLOSE
  CHANNEL_OPEN
  CHANNEL_PURCHASE
  CHANNEL_SALE
  DEPOSIT
  ROUTING
  WITHDRAW
}

input UpdateServiceApiKeyInput {
  name: String!
}

input UpdateWebhookEndpointInput {
  active: Boolean
  event_filters: [String!]
  id: String!
  url: String
}

type User {
  email: String
  has_access: Boolean! @deprecated(reason: "Use has_lp_access instead")
  has_lp_access: Boolean!
  id: String!
  is_master: Boolean!
  is_team: Boolean!
  liquidity_provider(input: LiquidityProviderInput): LiquidityProvider
  stripe: StripeInfo
  team: Team!
  terms_of_service: TermsOfService
  verification_info: VerificationInfo!
}

type UserMutations {
  accept_terms_of_service: TermsOfService!
  check_team_password(password_hash: String!): CheckPasswordResult!
  request_transaction_export(input: RailsTxnsExportInput!): RailsTxnsExportResult!
  store_team_password_and_keys(encrypted_symmetric_key: String!, password_hash: String!): StorePasswordResult!
}

type VerificationInfo {
  account_info: AccountInfo
  id: String!
  status: VerificationStatus!
}

enum VerificationStatus {
  COMPLETED
  IN_PROGRESS
  NOT_COMPLETED
}

type WalletMutations {
  create(input: CreatePaymentsWalletInput!): PaymentsWallet!
  delete(id: String!): Boolean!
  id: String!
}

type WalletNodePermissions {
  encrypted_symmetric_key: String!
  id: String!
  nodes: [NodePermission!]!
}

type WalletQueries {
  find_many: FindManyWallets!
  find_one(id: String!): PaymentsWallet!
  id: String!
}

type WebhookDelivery {
  attempt_number: Int!
  created_at: String!
  error_message: String
  http_status: Int
  id: String!
  status: WebhookDeliveryStatus!
  updated_at: String!
  webhook_endpoint_id: String!
}

enum WebhookDeliveryStatus {
  FAILED
  IN_PROGRESS
  PENDING
  SUCCESS
}

type WebhookEndpoint {
  active: Boolean!
  created_at: String!
  environment_id: String!
  event_filters: [String!]!
  id: String!
  updated_at: String!
  url: String!
}

type WebhookEndpointMutations {
  create(input: CreateWebhookEndpointInput!): CreateWebhookEndpointResult!
  delete(id: String!): Boolean!
  id: String!
  rotate_secret(id: String!): CreateWebhookEndpointResult!
  update(input: UpdateWebhookEndpointInput!): WebhookEndpoint!
}

type WebhookEndpointQueries {
  available_event_types: [String!]!
  find_many: FindManyWebhookEndpoints!
  find_one(id: String!): WebhookEndpoint!
  id: String!
}

type WebhookEvent {
  created_at: String!
  deliveries: [WebhookDelivery!]!
  environment_id: String!
  event_type: String!
  id: String!
  idempotency_key: String!
  payload: String!
  transaction_id: String
  wallet_id: String!
}

type WebhookEventQueries {
  find_many(input: ListWebhookEventsInput!): FindManyWebhookEvents!
  find_one(id: String!): WebhookEvent!
  id: String!
}
